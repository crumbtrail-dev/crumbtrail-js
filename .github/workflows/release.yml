name: release

# Publishes every package in packages/* to npm at its current version.
# Manual by design: bump versions in a PR, merge, then run this.
on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Pack only; do not publish"
        type: boolean
        default: true
      skip_detect_core:
        description: "Exclude crumbtrail-detect-core from publishing (temporary: until its npm trusted publisher is configured)"
        type: boolean
        default: false

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # Mints the OIDC id-token pnpm exchanges for a short-lived publish token
      # (npm trusted publishing) — and the same token backs provenance. There is
      # deliberately NO npm token here: 2FA-bypass tokens lose publish rights in
      # early 2027, and every package is registered as a trusted publisher of
      # THIS workflow file (release.yml). Renaming this file breaks publishing
      # until the trusted-publisher config on npmjs.com is renamed to match.
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          # >=11.10 speaks OIDC. Pinned exactly: 11.13.0 is also the release that
          # stopped an unresolved ${NODE_AUTH_TOKEN} placeholder in the .npmrc
          # setup-node writes from being sent as a literal bearer token, which
          # 404s the OIDC publish.
          version: 11.13.0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org
      - run: pnpm install --frozen-lockfile
      # build first: workspace typecheck resolves sibling packages' dist types.
      - run: pnpm build
      - run: pnpm typecheck
      - run: pnpm test

      - name: Publish
        # --no-git-checks: the build writes dist/, which is gitignored but makes
        # pnpm consider the tree dirty.
        run: |
          # Build the package selection. detect-core is inlined into the CLI via
          # tsup noExternal, so excluding it from a publish still ships the CLI's
          # fix — it only defers publishing the standalone detect-core package.
          FILTER=(--filter './packages/*')
          if [ "${{ inputs.skip_detect_core }}" = "true" ]; then
            FILTER+=(--filter '!crumbtrail-detect-core')
            echo "skip_detect_core=true — excluding crumbtrail-detect-core from this run."
          fi
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            pnpm -r "${FILTER[@]}" exec npm pack --dry-run
          else
            pnpm -r "${FILTER[@]}" publish --access public --no-git-checks
          fi
        env:
          NPM_CONFIG_PROVENANCE: true

  publish-crate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # Same trusted-publishing model as npm above: crates.io exchanges the OIDC
      # id-token for a short-lived publish token, so there is deliberately NO
      # CARGO_REGISTRY_TOKEN secret. The crate must be configured on crates.io
      # (tauri-plugin-crumbtrail → Settings → Trusted Publishing) with this repo
      # and workflow file (release.yml); renaming this file breaks crate
      # publishing until that config is renamed to match.
      id-token: write
    defaults:
      run:
        working-directory: packages/tauri/rust
    steps:
      - uses: actions/checkout@v4
      # Tauri's Linux backend compiles against GTK/WebKitGTK system libraries.
      - name: Install Tauri system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file \
            libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev
      - run: cargo test
      - name: Skip if version already published
        id: check
        run: |
          VERSION=$(cargo pkgid | sed 's/.*[#@]//')
          if curl -s https://index.crates.io/ta/ur/tauri-plugin-crumbtrail | grep -q "\"vers\":\"$VERSION\""; then
            echo "tauri-plugin-crumbtrail $VERSION is already on crates.io; skipping publish."
            echo "published=true" >> "$GITHUB_OUTPUT"
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
          fi
      - uses: rust-lang/crates-io-auth-action@v1
        if: ${{ !inputs.dry_run && steps.check.outputs.published == 'false' }}
        id: auth
      - name: Publish
        if: ${{ steps.check.outputs.published == 'false' }}
        run: |
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            cargo publish --dry-run
          else
            cargo publish
          fi
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
