name: release

# Publishes every package in packages/* to npm at its current version.
# Manual by design: bump versions in a PR, merge, then run this.
on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Pack only; do not publish"
        type: boolean
        default: true

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # npm provenance
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm build
      - run: pnpm test

      - name: Publish
        # --no-git-checks: the build writes dist/, which is gitignored but makes
        # pnpm consider the tree dirty.
        run: |
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            pnpm -r --filter './packages/*' exec npm pack --dry-run
          else
            pnpm -r --filter './packages/*' publish --access public --no-git-checks
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: true
