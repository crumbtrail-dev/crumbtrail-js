name: release

# Publishes public packages selected from changed package paths plus workspace
# dependency propagation since the supplied base ref. The release runner packs
# the entire set first, then skips only registry artifacts with matching SRI.
on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Pack only; do not publish"
        type: boolean
        default: true
      base_ref:
        description: "Required git ref for the release baseline (normally the prior release commit or tag)"
        required: true
        type: string
jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # Mints the OIDC id-token pnpm exchanges for a short-lived publish token
      # (npm trusted publishing) — and the same token backs provenance. There is
      # deliberately NO npm token here: 2FA-bypass tokens lose publish rights in
      # early 2027, and every package is registered as a trusted publisher of
      # THIS workflow file (release.yml). Renaming this file breaks publishing
      # until the trusted-publisher config on npmjs.com is renamed to match.
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
        with:
          # >=11.10 speaks OIDC. Pinned exactly: 11.13.0 is also the release that
          # stopped an unresolved ${NODE_AUTH_TOKEN} placeholder in the .npmrc
          # setup-node writes from being sent as a literal bearer token, which
          # 404s the OIDC publish.
          version: 11.13.0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org
      - run: pnpm install --frozen-lockfile
      # build first: workspace typecheck resolves sibling packages' dist types.
      - run: pnpm build
      - run: pnpm verify:sdk-version-floors
      - run: pnpm verify:fresh-install
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm test:release

      - name: Create release plan and publish selected packages
        # pnpm pack creates actual .tgz artifacts and rewrites workspace:^ specs.
        # pnpm publish is required for the same workspace-protocol correctness.
        run: |
          if [ "$RELEASE_DRY_RUN" = "true" ]; then
            pnpm release:plan -- --base-ref "$RELEASE_BASE_REF" --mode dry-run
          else
            pnpm release:plan -- --base-ref "$RELEASE_BASE_REF" --mode publish
          fi
        env:
          NPM_CONFIG_PROVENANCE: true
          RELEASE_BASE_REF: ${{ inputs.base_ref }}
          RELEASE_DRY_RUN: ${{ inputs.dry_run }}
      - name: Upload dry-run package artifacts
        if: ${{ inputs.dry_run }}
        uses: actions/upload-artifact@v4
        with:
          name: npm-release-dry-run
          path: .release-artifacts/
          if-no-files-found: error

  publish-crate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # Same trusted-publishing model as npm above: crates.io exchanges the OIDC
      # id-token for a short-lived publish token, so there is deliberately NO
      # CARGO_REGISTRY_TOKEN secret. The crate must be configured on crates.io
      # (tauri-plugin-crumbtrail → Settings → Trusted Publishing) with this repo
      # and workflow file (release.yml); renaming this file breaks crate
      # publishing until that config is renamed to match.
      id-token: write
    defaults:
      run:
        working-directory: packages/tauri/rust
    steps:
      - uses: actions/checkout@v4
      # Tauri's Linux backend compiles against GTK/WebKitGTK system libraries.
      - name: Install Tauri system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file \
            libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev
      - run: cargo test
      - name: Skip if version already published
        id: check
        run: |
          VERSION=$(cargo pkgid | sed 's/.*[#@]//')
          if curl -s https://index.crates.io/ta/ur/tauri-plugin-crumbtrail | grep -q "\"vers\":\"$VERSION\""; then
            echo "tauri-plugin-crumbtrail $VERSION is already on crates.io; skipping publish."
            echo "published=true" >> "$GITHUB_OUTPUT"
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
          fi
      - uses: rust-lang/crates-io-auth-action@v1
        if: ${{ !inputs.dry_run && steps.check.outputs.published == 'false' }}
        id: auth
      - name: Publish
        if: ${{ steps.check.outputs.published == 'false' }}
        run: |
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            cargo publish --dry-run
          else
            cargo publish
          fi
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
